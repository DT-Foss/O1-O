# Isolated network, Tor routing, ephemeral storage
services:
  port_scanner_with_service_fingerprinting:
    build: .
    container_name: forge-port_scanner_with_service_fingerprinting
    # ports mapped via host network mode
    network_mode: "host"
    cap_add:
      - NET_RAW
      - NET_ADMIN


    tmpfs:
      - /tmp:size=100m,mode=1777
      - /app/data:size=50m
    read_only: true
    security_opt:
      - no-new-privileges:true
    ulimits:
      core:
        soft: 0
        hard: 0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    stop_grace_period: 5s
    labels:
      - "forge.auto-destruct=60m"
    networks:
      - isolated


networks:
  isolated:
    driver: bridge
    internal: true  # No direct internet access — all traffic via Tor
